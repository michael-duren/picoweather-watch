[paths]
data = /tmp/grafana-data
logs = /tmp/grafana-logs
plugins = /tmp/grafana-plugins
provisioning = /tmp/grafana-provisioning

[server]
protocol = http
http_addr = 127.0.0.1
http_port = 3000

[analytics]
reporting_enabled = false
check_for_updates = false

[security]
admin_user = admin
admin_password = admin

[log]
mode = console
level = info
