global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "picoweather-monitor"

scrape_configs:
  - job_name: "weather-reader"
    scrape_interval: 5s
    static_configs:
      - targets: ["localhost:8080"]
        labels:
          service: "weather-reader"
          environment: "production"
